description: >-
  Darden Restaurants is the largest full-service restaurant company in the
  world, owning and operating brands such as Olive Garden, LongHorn
  Steakhouse, Yard House, The Capital Grille, Cheddar's Scratch Kitchen,
  Eddie V's, Seasons 52, Bahama Breeze, Ruth's Chris Steak House, and Chuy's.
